*MY COLOR CHANGING WEBSITE*
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>SEE THE MAGIC  by clicking any of the buttons !!</h2>

    <button class="color-btn">Pink</button>
    <button class="color-btn">LightBlue</button>
    <button class="color-btn">purple</button>
</body>

<script>
    const buttons = document.querySelectorAll(".color-btn")

    buttons.forEach(function (btn) {

        btn.addEventListener("click", function (event) {

            const color = event.target.innerText.toLowerCase()

            document.body.style.backgroundColor = color

        })

    })
</script>

</html>
